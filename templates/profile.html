{% extends "base.html" %}

{% block title %}Profile — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Your profile</h1>
            <p class="auth-subtitle">Account details for {{ name }}</p>
        </div>

        <div class="auth-card">
            <div class="form-group">
                <label>Full name</label>
                <p class="profile-value">{{ name }}</p>
            </div>
            <div class="form-group">
                <label>Email address</label>
                <p class="profile-value">{{ email }}</p>
            </div>
            <div class="form-group">
                <label>Member since</label>
                <p class="profile-value">{{ joined }}</p>
            </div>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('logout') }}">Sign out of your account</a>
        </p>

    </div>
</section>

{% endblock %}
